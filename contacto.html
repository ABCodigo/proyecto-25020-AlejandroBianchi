    <main>
        <section>
            <form action="" autocomplete="off">
                <h1>CONTACTO</h1>
                <h2>Dejanos tu Mensaje</h2>

                <label for="nombre">Nombre y Apellido</label>
                <input type="text" id="nombre" name="name" autofocus required><br>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required><br>

                <label for="telefono">Telefono</label>
                <input type="tel" id="telefono" name="phone" required><br>

                <label for="asunto">Asunto</label required>
                <select name="asunto" id="asunto">
                    <option>Comercial</option>
                    <option>Sugerencias</option>
                    <option>Reserva</option>
                </select>
                <br>

                <label for="mensaje">Mensaje</label>
                <textarea rows="10" cols="5" name="mensaje" id="mensaje"></textarea>

                <input type="submit" value="Enviar">

                <input type="reset" value="Resetear">

            </form>


        </section>
    </main>
