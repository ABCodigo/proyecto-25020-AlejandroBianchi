    <main>
        <section>

            <h1>REGISTRESE</h1>

            <form action="" autocomplete="off">
            
                <label for="name">Nombre</label>
                <input type="text" id="name" name="usuario" autofocus required><br>
            
                <label for="surname">Apellido</label>
                <input type="text" id="surname" name="apellido" required><br>
            
                <label for="birthday">Fecha nacimiento</label>
                <input type="date" id="birthday" name="" required>
            
                <label for="gender">Genero</label>
                <select id="gender" name="genero" required>
                    <option value="malen">Masculino</option>
                    <option value="female">Femenino</option>
                    <option value="nobinario">No Binario</option>
                </select><br>

                <label for="state">Provincia</label>
                <input type="text" id="state" name="provincia" required>
            
                <label for="town">Localidad</label>
                <input type="text" id="town" name="localidad" required><br>
            
                <label for="neigbordhood">Barrio</label>
                <input type="text" id="neigbordhood" name="barrio" required>
            
                <label for="street">Calle</label>
                <input type="text" id="street" name="calle" required>
            
                <label for="blocknumber">Numero</label>
                <input type="number" id="blocknumber" name="altura" required>
            
                <label for="floor">Piso</label>
                <input type="text" id="floor" name="piso" required>
            
                <label for="department">Depto.</label>
                <input type="text" id="department" name="departamento" required>
            
                <label for="zipcode">Codigo Postal</label>
                <input type="text" id="zipcode" name="codigo" required><br>
            
                <label for="phone">Telefono</label>
                <input type="number" id="phone" name="codigotel" placeholder="(011) codigo sin 0" maxlength="5" required>
                <input type="number" placeholder="(15)" disabled>
                <input type="number" id="phone" name="telefono" placeholder="0000-0000" maxlength="8"><br>
            
                <label for="email">E-mail</label>
                <input type="email" id="email" name="correo" required><br>
            
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" name="contraseña"><br>
            
                <button type="submit">Enviar</button><br>
            
                <input type="reset" value="Resetear">
            
            </form>
    
    
        </section>
    </main>

    <footer>
